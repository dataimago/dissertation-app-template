name: Generate (dataimago::ai)
#
# Re-generates derived files (types.ts, mcp-schema.json, .ai-context/, etc.)
# from the current `dataimago-spec.yaml` + R package source.
#
# Currently **manual-trigger only** (`workflow_dispatch`).
#
# Why manual-only as of D.2.2.b: the underlying `dataimago::ai(spec_path)`
# function in `dataimago-rpkg` doesn't yet read the spec.yaml + drive
# generation — that's tracked work for D.2.3.b (or possibly iteration-4).
# Once it ships, this workflow flips to `on: push: branches: [main]` with
# `paths: ['dataimago-spec.yaml', 'packages/r-packages/**']` so changes to
# the spec auto-regenerate.
#
# For now, **AI assistance in your editor** (Claude Code, Cursor, etc.) is
# how you regenerate. After editing `dataimago-spec.yaml`, ask the AI to
# apply the changes wherever needed (mostly chapter front-matter +
# README + the methodology section).
#
on:
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dataimago
            any::yaml
            any::jsonlite

      - name: Run dataimago::ai(spec_path)
        run: |
          Rscript -e 'dataimago::ai(spec_path = "dataimago-spec.yaml")'

      - name: Commit + push generated changes
        run: |
          git config user.name "dataimago-bot"
          git config user.email "bot@dataimago.ai"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "chore(generate): refresh from dataimago::ai() [skip ci]"
            git push
          else
            echo "(no changes to commit)"
          fi
